openapi: 3.1.0
info:
  title: EcoDrop API Seed
  version: 0.2.0
  description: API seed for the EcoDrop prototype. The FastAPI app exposes live docs at /docs.
servers:
  - url: http://localhost:8000
paths:
  /health:
    get:
      summary: Health check
      responses:
        "200":
          description: Backend is running
  /api/deposit-sessions:
    post:
      summary: Create a deposit session from a SmartBin QR token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [qr_token, user_id]
              properties:
                qr_token:
                  type: string
                  example: ECO-SMARTBIN-001
                user_id:
                  type: string
                  example: user-demo-001
      responses:
        "200":
          description: Deposit session created
        "409":
          description: SmartBin is offline or user already has an active session
  /api/withdrawals:
    post:
      summary: Create a user withdrawal request
      responses:
        "200":
          description: Pending withdrawal created
        "409":
          description: User has insufficient points
  /api/deposit-sessions/{session_id}/validate:
    post:
      summary: Validate bottle image and queue SmartBin open command if valid
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                image:
                  type: string
                  format: binary
      responses:
        "200":
          description: Updated session with validation result
        "409":
          description: Session cannot be validated from its current lifecycle status
  /api/deposit-sessions/{session_id}/confirm:
    post:
      summary: Development-only manual sensor confirmation
      parameters:
        - in: path
          name: session_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Successful or failed deposit transaction
  /api/iot/devices/{device_id}/commands/next:
    get:
      summary: Poll next SmartBin command
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SmartBin command or noop
        "404":
          description: SmartBin device not found
  /api/iot/devices/{device_id}/commands/{command_id}/ack:
    post:
      summary: Acknowledge a SmartBin command
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: string
        - in: path
          name: command_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [status]
              properties:
                status:
                  type: string
                  enum: [acknowledged, failed]
                message:
                  type: string
      responses:
        "200":
          description: Updated SmartBin command
  /api/iot/devices/{device_id}/sensor-events:
    post:
      summary: Submit IR sensor event for active deposit session
      parameters:
        - in: path
          name: device_id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [session_id, sensor_state]
              properties:
                session_id:
                  type: string
                sensor_state:
                  type: string
                  enum: [object_detected, clear]
                raw_value:
                  type: integer
                event_id:
                  type: string
      responses:
        "200":
          description: Sensor event accepted or ignored
  /api/admin/iot-logs:
    get:
      summary: List recent IoT command, heartbeat, and sensor logs
      responses:
        "200":
          description: Recent IoT logs
  /api/admin/withdrawals/{withdrawal_id}:
    patch:
      summary: Update withdrawal status
      responses:
        "200":
          description: Updated withdrawal request
  /api/admin/education:
    post:
      summary: Create education article
      responses:
        "200":
          description: Created education article
  /api/admin/education/{article_id}:
    patch:
      summary: Update education article
      responses:
        "200":
          description: Updated education article
